<!DOCTYPE html>
<html class="mdui-theme-auto" lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no" name="viewport"/>
    <meta content="webkit" name="renderer"/>
    <link href="https://unpkg.com/mdui@2/mdui.css" rel="stylesheet">
    <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <title th:text="#{register.title}">Register</title>

    <link href="/assets/css/register.css" rel="stylesheet" th:href="@{/assets/css/register.css}"/>
</head>
<body>
<div class="container animate__animated animate__fadeInDown">
    <mdui-card>
        <form class="form-register" method="post" th:action="@{/user/register}">
            <h1 class="h3 mb-3 fw-normal animate__animated animate__fadeInUp animate__delay-1s"
                th:text="#{register.headline}">Register</h1>
            <div class="alert alert-danger animate__animated animate__bounceIn animate__delay-1s"
                 th:if="${param.error}">
                <p th:text="#{register.error}">Email always exists</p>
            </div>
            <mdui-text-field autofocus class="animate__animated animate__backInUp animate__delay-1s" label="Email"
                             name="email" required
                             tabindex="0" th:label="#{register.email}" type="email">
                <mdui-button-icon icon="email" slot="icon"></mdui-button-icon>
            </mdui-text-field>
            <mdui-text-field class="animate__animated animate__backInUp animate__delay-1s" label="Password"
                             name="password" required
                             tabindex="1" th:label="#{login.password}" type="password">
                <mdui-button-icon icon="password" slot="icon"></mdui-button-icon>
            </mdui-text-field>
            <mdui-button class="animate__animated animate__bounceIn animate__delay-1s" th:text="#{register.button}"
                         type="submit">Register
            </mdui-button>
            <mdui-button
                class="animate__animated animate__bounceIn animate__delay-1s"
                th:href="@{/user/login}"
                th:text="#{login.link}"
                variant="outlined">
                Login
            </mdui-button>
            <mdui-button
                class="animate__animated animate__bounceIn animate__delay-1s"
                th:href="@{/user/confirm}"
                th:text="#{register.confirm.link}"
                variant="outlined">
                Go Verify
            </mdui-button>
        </form>
    </mdui-card>
</div>
</body>
</html>
