<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title th:text="#{device.title}">Remote Link</title>
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="row py-5">
        <div class="col-md-5">
            <h2 th:text="#{device.headline}">Device Activation</h2>
            <p th:text="#{device.tip}">Enter the activation code to authorize the device.</p>
            <p th:text="#{device.security}">Security Warning: Please ensure this device can be trusted</p>
            <div class="mt-5">
                <form method="post" th:action="@{/oauth2/device_verification}">
                    <div class="mb-3">
                        <label class="form-label" for="user_code" th:text="#{device.code}">Activation Code</label>
                        <input autofocus class="form-control" id="user_code" name="user_code" required type="text">
                    </div>
                    <div class="mb-3">
                        <button class="btn btn-primary" th:text="#{device.submit}" type="submit">Submit</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="col-md-7">
            <img alt="Devices" class="img-responsive" src="/assets/img/devices.png" th:src="@{/assets/img/devices.png}">
        </div>
    </div>
</div>
</body>
</html>
